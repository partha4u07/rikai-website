<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rik.ai — The New Verse of Market Intelligence</title>
<meta name="description" content="Rik.ai — AI-powered market research that listens. The new verse of market intelligence. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#06080F;--bg2:#0C0F1A;
    --pm:#8B5CF6;--pl:#A78BFA;--bm:#3B82F6;--bl:#60A5FA;--cy:#22D3EE;
    --w:#F8FAFC;--wm:#94A3B8;--wd:#475569;
  }
  body{background:var(--bg);color:var(--w);font-family:'Poppins',sans-serif;min-height:100vh;overflow-x:hidden;display:flex;align-items:center;justify-content:center;position:relative}
  .glow-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
  .glow-orb.purple{width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,.12),transparent 70%);top:-10%;left:-5%;animation:d1 20s ease-in-out infinite}
  .glow-orb.blue{width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,.1),transparent 70%);bottom:-5%;right:-5%;animation:d2 25s ease-in-out infinite}
  .glow-orb.gold{width:200px;height:200px;background:radial-gradient(circle,rgba(245,158,11,.08),transparent 70%);top:15%;right:25%;animation:d3 15s ease-in-out infinite}
  @keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
  @keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-40px)}}
  @keyframes d3{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}
  .grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(139,92,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.03) 1px,transparent 1px);background-size:60px 60px}

  .container{position:relative;z-index:1;text-align:center;padding:2rem;max-width:720px;width:100%}

  .logo-area{margin-bottom:2rem;opacity:0;animation:rise 1s cubic-bezier(.16,1,.3,1) .2s forwards}
  .logo-img{
    width:160px;height:auto;margin:0 auto 1.2rem;display:block;
    filter:drop-shadow(0 0 25px rgba(139,92,246,.2));
  }


  .wordmark{display:flex;align-items:baseline;justify-content:center;line-height:1}
  .wordmark-rik{font-size:3.8rem;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,var(--w),var(--wm));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .wordmark-dot{font-size:3.8rem;font-weight:300;margin:0 2px;background:linear-gradient(135deg,var(--pm),var(--bm));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .wordmark-ai{font-size:3.8rem;font-weight:300;background:linear-gradient(135deg,var(--pm),var(--bm),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

  .tagline{font-size:.78rem;font-weight:400;letter-spacing:5px;text-transform:uppercase;color:var(--wm);margin-top:1rem;opacity:0;animation:rise 1s cubic-bezier(.16,1,.3,1) .5s forwards}

  .divider{width:120px;height:2px;margin:2.5rem auto;background:linear-gradient(90deg,transparent,var(--pm),var(--bm),transparent);opacity:0;animation:rise 1s cubic-bezier(.16,1,.3,1) .7s forwards}

  .status-pill{display:inline-flex;align-items:center;gap:12px;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:100px;padding:.9rem 2.8rem;margin-bottom:2.5rem;opacity:0;animation:rise 1s cubic-bezier(.16,1,.3,1) .9s forwards;position:relative;overflow:hidden}
  .status-pill::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(139,92,246,.12),transparent);animation:shimmer 3s ease-in-out infinite 2s}
  @keyframes shimmer{0%{left:-100%}100%{left:100%}}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--pm);animation:pulse-dot 2s ease-in-out infinite}
  @keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(139,92,246,0)}}
  .status-text{font-size:.9rem;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--pl)}

  .description{font-size:1.05rem;font-weight:300;color:var(--wd);line-height:1.9;margin-bottom:2.5rem;max-width:480px;margin-left:auto;margin-right:auto;opacity:0;animation:rise 1s cubic-bezier(.16,1,.3,1) 1.1s forwards}
  .description strong{color:var(--wm);font-weight:400}

  .features{display:flex;justify-content:center;gap:2.5rem;margin-bottom:2rem;flex-wrap:wrap;opacity:0;animation:rise 1s cubic-bezier(.16,1,.3,1) 1.2s forwards}
  .feature{display:flex;align-items:center;gap:8px}
  .feature-icon{width:28px;height:28px;border-radius:6px;background:rgba(139,92,246,.08);display:flex;align-items:center;justify-content:center}
  .feature-icon svg{width:14px;height:14px}
  .feature span{font-size:.75rem;font-weight:400;color:var(--wd);letter-spacing:.5px}



  .contact{font-size:.75rem;font-weight:300;color:var(--wd);opacity:0;animation:rise 1s cubic-bezier(.16,1,.3,1) 1.3s forwards}
  .contact a{color:var(--bl);text-decoration:none;transition:color .3s}
  .contact a:hover{color:var(--pl)}

  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  @media(max-width:600px){
    .wordmark-rik,.wordmark-dot,.wordmark-ai{font-size:2.8rem}
    .tagline{font-size:.65rem;letter-spacing:3px}
    .logo-img{width:120px}
    .features{gap:1.2rem}
  }
</style>
</head>
